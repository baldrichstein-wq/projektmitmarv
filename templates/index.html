<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Bootstrap 5 Webseite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('home') }}">Mein Logo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="{{ url_for('home') }}">Startseite</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('ueber_uns') }}">Über uns</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('verwalte_benutzer') }}">Benutzer</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('verwalte_wein') }}">Wein</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2 text-center">
                <h1 class="mb-4">Hallo {{ name }}!</h1>
                <p class="lead">Dies ist deine Seite mit Flask, die jetzt auf den Projekt-Code zugreift.</p>
                <a class="btn btn-primary btn-lg mt-3" href="{{ url_for('verwalte_benutzer') }}">Benutzer verwalten</a>
                <a class="btn btn-secondary btn-lg mt-3 ms-2" href="{{ url_for('verwalte_wein') }}">Wein verwalten</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
